<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Roles — SGU</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/styles.css"/>
</head>
<body>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>requireAuth(); renderLayout('roles');</script>

<div class="main">
  <div class="topbar">
    <h1><i class="fa fa-shield-halved" style="color:var(--brand)"></i> &nbsp;Roles</h1>
    <div class="actions">
      <button class="btn-brand" id="btnNuevo">
        <i class="fa fa-plus"></i> &nbsp;Nuevo Rol
      </button>
    </div>
  </div>
  <div class="content">

    <!-- Buscar por nombre (API) -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-header-custom">
        <h5><i class="fa fa-magnifying-glass"></i> &nbsp;Consultar rol por nombre (API)</h5>
      </div>
      <div class="card-body-custom">
        <div style="display:flex;gap:10px;align-items:center">
          <div class="form-group" style="flex:1;margin:0">
            <input id="txBuscarNombre" placeholder="Ingresa el nombre exacto del rol (ej. admin)"/>
          </div>
          <button class="btn-brand" id="btnBuscarNombre">
            <i class="fa fa-search"></i> &nbsp;Buscar
          </button>
        </div>
        <div id="resultadoBusqueda" style="margin-top:14px"></div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="card">
      <div class="card-header-custom">
        <h5>Todos los roles</h5>
        <div class="search-bar" style="width:240px">
          <i class="fa fa-search"></i>
          <input id="searchInput" placeholder="Filtrar localmente..."/>
        </div>
      </div>
      <div class="card-body-custom">
        <div class="table-wrap">
          <table class="styled">
            <thead>
              <tr>
                <th>#</th><th>Valor (Nombre)</th><th>Descripción</th><th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbodyRoles">
              <tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text-muted)">
                <i class="fa fa-spinner fa-spin"></i> Cargando...
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalRol">
  <div class="modal-box">
    <div class="modal-head">
      <h4 id="modalTitle">Nuevo Rol</h4>
      <button class="modal-close" id="btnCerrar">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="fId"/>
      <div class="form-row cols-1">
        <div class="form-group">
          <label>Valor / Nombre del Rol *</label>
          <input id="fValor" placeholder="Ej. admin, editor, viewer"/>
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <textarea id="fDesc" placeholder="Descripción del rol..." rows="3"
            style="resize:vertical"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-icon" id="btnCancelar" style="padding:8px 18px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font);font-weight:600;cursor:pointer">Cancelar</button>
      <button class="btn-brand" id="btnGuardar"><i class="fa fa-floppy-disk"></i> &nbsp;Guardar</button>
    </div>
  </div>
</div>

<script>
let allRoles = [];
let editMode = false;

async function loadRoles() {
  try {
    allRoles = await API.roles.getAll();
    renderTable(allRoles);
  } catch(e) {
    $('#tbodyRoles').html(`<tr><td colspan="4" style="text-align:center;color:var(--danger)">Error: ${e.message}</td></tr>`);
  }
}

function renderTable(data) {
  if (!data.length) {
    $('#tbodyRoles').html('<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--text-muted)">Sin registros</td></tr>');
    return;
  }
  const rows = data.map(r => `
    <tr>
      <td>${r.Id}</td>
      <td><span class="badge-role">${r.Valor || '—'}</span></td>
      <td style="font-size:.85rem;color:var(--text-muted)">${r.Descripcion || '—'}</td>
      <td>
        <button class="btn-icon edit" onclick="editarRol(${r.Id})"><i class="fa fa-pen"></i></button>
        <button class="btn-icon del" onclick="eliminarRol(${r.Id})"><i class="fa fa-trash"></i></button>
      </td>
    </tr>`).join('');
  $('#tbodyRoles').html(rows);
}

// Buscar por nombre vía API
$('#btnBuscarNombre').click(async () => {
  const val = $('#txBuscarNombre').val().trim();
  if (!val) { toast('Ingresa un nombre para buscar', 'warning'); return; }
  try {
    showSpinner(true);
    const r = await API.roles.getByNombre(val);
    $('#resultadoBusqueda').html(`
      <div style="background:var(--brand-soft);border-radius:10px;padding:14px 18px;display:flex;gap:20px;align-items:center">
        <div><label style="font-size:.74rem;color:var(--text-muted);display:block">ID</label><strong>${r.Id}</strong></div>
        <div><label style="font-size:.74rem;color:var(--text-muted);display:block">Valor</label><strong>${r.Valor}</strong></div>
        <div style="flex:1"><label style="font-size:.74rem;color:var(--text-muted);display:block">Descripción</label><span>${r.Descripcion||'—'}</span></div>
        <button class="btn-brand" onclick="editarRol(${r.Id})" style="background:var(--brand)">
          <i class="fa fa-pen"></i>
        </button>
      </div>`);
  } catch(e) {
    $('#resultadoBusqueda').html(`<p style="color:var(--danger);margin:0">No encontrado: ${e.message}</p>`);
  } finally { showSpinner(false); }
});

$('#txBuscarNombre').keypress(e => { if(e.which===13) $('#btnBuscarNombre').click(); });

// Filtro local
$('#searchInput').on('input', function(){
  const q = $(this).val().toLowerCase();
  renderTable(allRoles.filter(r =>
    (r.Valor||'').toLowerCase().includes(q) ||
    (r.Descripcion||'').toLowerCase().includes(q)
  ));
});

$('#btnNuevo').click(() => {
  editMode = false;
  resetForm();
  $('#modalTitle').text('Nuevo Rol');
  openModal();
});

async function editarRol(id) {
  try {
    showSpinner(true);
    const r = await API.roles.getById(id);
    editMode = true;
    resetForm();
    $('#fId').val(r.Id);
    $('#fValor').val(r.Valor);
    $('#fDesc').val(r.Descripcion);
    $('#modalTitle').text('Editar Rol #' + id);
    openModal();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  } finally { showSpinner(false); }
}

async function eliminarRol(id) {
  if (!confirm('¿Eliminar rol #' + id + '?')) return;
  try {
    showSpinner(true);
    await API.roles.delete(id);
    toast('Rol eliminado correctamente');
    loadRoles();
  } catch(e) {
    // El backend devuelve 409 con el mensaje detallado
    toast(e.message, 'error');
  } finally { showSpinner(false); }
}

$('#btnGuardar').click(async () => {
  const valor = $('#fValor').val().trim();
  if (!valor) { toast('El nombre del rol es obligatorio', 'warning'); return; }
  const data = { Valor: valor, Descripcion: $('#fDesc').val().trim() };
  try {
    showSpinner(true);
    if (editMode) {
      await API.roles.update(parseInt($('#fId').val()), data);
      toast('Rol actualizado');
    } else {
      await API.roles.create(data);
      toast('Rol creado');
    }
    closeModal();
    loadRoles();
  } catch(e) {
    toast('Error: ' + e.message, 'error');
  } finally { showSpinner(false); }
});

function openModal(){ document.getElementById('modalRol').classList.add('open'); }
function closeModal(){ document.getElementById('modalRol').classList.remove('open'); }
function resetForm(){ ['fId','fValor','fDesc'].forEach(i => $(`#${i}`).val('')); }

$('#btnCerrar, #btnCancelar').click(closeModal);

loadRoles();
</script>
</body>
</html>
